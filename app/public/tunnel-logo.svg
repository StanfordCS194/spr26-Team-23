<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tunnel logo</title>
  <desc id="desc">Rounded dark square logo with a centered circular lens.</desc>
  <defs>
    <linearGradient id="icon" x1="4" y1="3" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242A3B"/>
      <stop offset="1" stop-color="#111624"/>
    </linearGradient>
    <linearGradient id="lens" x1="12" y1="11" x2="27" y2="27" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B3041"/>
      <stop offset="1" stop-color="#0D111D"/>
    </linearGradient>
    <filter id="shadow" x="1" y="1" width="38" height="38" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0B1020" flood-opacity=".22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="4" y="3" width="32" height="32" rx="8" fill="url(#icon)"/>
    <circle cx="20" cy="19" r="8.5" fill="url(#lens)" stroke="#444A5E" stroke-width="1.1"/>
    <circle cx="20" cy="19" r="4.8" fill="#151A28" stroke="#878B98" stroke-width=".8"/>
    <circle cx="20" cy="19" r="2.45" fill="#F4E4B7"/>
    <circle cx="19.2" cy="18.1" r=".75" fill="#FFF8DC"/>
  </g>
</svg>
